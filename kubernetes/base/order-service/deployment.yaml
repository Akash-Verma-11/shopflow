apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: shopflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
    spec:
      serviceAccountName: shopflow-sa
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: order-service
      containers:
        - name: order-service
          image: 282538118471.dkr.ecr.ap-south-1.amazonaws.com/shopflow/order-service:latest
          ports:
            - containerPort: 3002
          envFrom:
            - secretRef:
                name: db-credentials
          env:
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:5001"
            - name: USER_SERVICE_URL
              value: "http://user-service:3001"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3002
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: shopflow
spec:
  selector:
    app: order-service
  ports:
    - port: 3002
      targetPort: 3002
