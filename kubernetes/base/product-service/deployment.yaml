apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shopflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5001"
    spec:
      serviceAccountName: shopflow-sa
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: product-service
      containers:
        - name: product-service
          image: 282538118471.dkr.ecr.ap-south-1.amazonaws.com/shopflow/product-service:latest
          ports:
            - containerPort: 5001
          envFrom:
            - secretRef:
                name: db-credentials
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 5001
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: shopflow
spec:
  selector:
    app: product-service
  ports:
    - port: 5001
      targetPort: 5001
