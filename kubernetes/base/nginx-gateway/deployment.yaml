apiVersion: apps/v1
kind: Deployment
metadata: { name: nginx-gateway, namespace: shopflow }
spec:
  replicas: 2
  selector: { matchLabels: { app: nginx-gateway } }
  template:
    metadata: { labels: { app: nginx-gateway } }
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports: [{ containerPort: 80 }]
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "SETUID", "SETGID"]
          volumeMounts:
            - { name: nginx-conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf }
            - { name: cache, mountPath: /var/cache/nginx }
            - { name: run, mountPath: /var/run }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
      volumes:
        - name: nginx-conf
          configMap: { name: nginx-gateway-config }
        - { name: cache, emptyDir: {} }
        - { name: run, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata: { name: nginx-gateway, namespace: shopflow }
spec:
  type: LoadBalancer
  selector: { app: nginx-gateway }
  ports: [{ port: 80, targetPort: 80 }]
